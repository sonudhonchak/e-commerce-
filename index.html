<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProStore Demo</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.product{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.slider{
position:relative;
height:200px;
overflow:hidden;
}

.slider img{
width:100%;
height:200px;
object-fit:cover;
display:none;
border-radius:8px;
}

.slider img.active{
display:block;
}

button{
background:#ff6b00;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e85c00;
}

.cart{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.cart ul{
padding:0;
list-style:none;
}

.cart li{
padding:5px 0;
border-bottom:1px solid #ddd;
}

.total{
font-size:20px;
margin-top:10px;
}

.pay{
background:green;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<h1>ProStore</h1>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#cart">Cart</a>
</nav>

</header>


<section class="products">

<div class="product">

<div class="slider">
<img src="https://picsum.photos/300/200?1" class="active">
<img src="https://picsum.photos/300/200?2">
<img src="https://picsum.photos/300/200?3">
</div>

<h3>Wireless Headphones</h3>
<p>₹1499</p>

<button onclick="addCart('Wireless Headphones',1499)">Add to Cart</button>

</div>


<div class="product">

<div class="slider">
<img src="https://picsum.photos/300/200?4" class="active">
<img src="https://picsum.photos/300/200?5">
<img src="https://picsum.photos/300/200?6">
</div>

<h3>Smart Watch</h3>
<p>₹2499</p>

<button onclick="addCart('Smart Watch',2499)">Add to Cart</button>

</div>


<div class="product">

<div class="slider">
<img src="https://picsum.photos/300/200?7" class="active">
<img src="https://picsum.photos/300/200?8">
<img src="https://picsum.photos/300/200?9">
</div>

<h3>Bluetooth Speaker</h3>
<p>₹999</p>

<button onclick="addCart('Bluetooth Speaker',999)">Add to Cart</button>

</div>

</section>



<section class="cart" id="cart">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<div class="total">
Total: ₹ <span id="total">0</span>
</div>

<button class="pay" onclick="payUPI()">Pay with UPI</button>

</section>


<footer>

<p>© 2026 ProStore Demo Website</p>

</footer>


<script>

let total=0

function addCart(name,price){

let li=document.createElement("li")

li.innerText=name+" - ₹"+price

document.getElementById("cartItems").appendChild(li)

total+=price

document.getElementById("total").innerText=total

}

function payUPI(){

let upi="upi://pay?pa=yourupi@upi&pn=ProStore&am="+total+"&cu=INR"

window.location.href=upi

}



document.querySelectorAll(".slider").forEach(slider=>{

let images=slider.querySelectorAll("img")

let index=0

setInterval(()=>{

images[index].classList.remove("active")

index=(index+1)%images.length

images[index].classList.add("active")

},2500)

})

</script>

</body>
</html>
